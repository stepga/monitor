<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="static/style.css">
		<script src="static/script.js"></script>
		<title>monitor</title>
	</head>

	<body>
		<h1>Critical Notifications</h1>
		<div>
			<input type="checkbox" id="verboseCheckbox" name="verboseCheckbox"/>
			<label for="verboseCheckbox">Show Live Notification Log</label>
		</div>

		<div class="container">
			<div class="left" id="critical"></div>
			<div class="right" id="verbose"></div>
		</div>

		<div id="confirmModal" class="modal hidden">
			<div class="modal-content">
				<p>Delete notification:</p>
				<pre id="modalNotificationName"></pre>
				<div class="modal-actions">
					<button id="confirmYes">Delete</button>
					<button id="confirmNo">Cancel</button>
				</div>
			</div>
		</div>
	</body>
</html>
